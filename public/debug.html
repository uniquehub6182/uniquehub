<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #111; color: #fff; font-family: monospace; }
#info { padding: 20px; padding-top: env(safe-area-inset-top, 0px); font-size: 13px; line-height: 2; }
#fill { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: red; z-index: -1; }
#bottom { position: fixed; bottom: 0; left: 0; right: 0; height: 4px; background: lime; }
</style>
</head>
<body>
<div id="fill"></div>
<div id="info">
  <div>window.innerHeight: <b id="ih"></b></div>
  <div>window.outerHeight: <b id="oh"></b></div>
  <div>screen.height: <b id="sh"></b></div>
  <div>document.body.offsetHeight: <b id="bh"></b></div>
  <div>safe-area-inset-top: <b id="sat"></b></div>
  <div>safe-area-inset-bottom: <b id="sab"></b></div>
  <div>standalone: <b id="sa"></b></div>
  <div>display-mode: <b id="dm"></b></div>
  <div style="margin-top:20px; background:#333; padding:10px;">
    Linha verde = bottom:0<br>
    Fundo vermelho = body<br>
    Se aparecer vermelho = gap
  </div>
</div>
<div id="bottom"></div>
<script>
document.getElementById('ih').textContent = window.innerHeight;
document.getElementById('oh').textContent = window.outerHeight;
document.getElementById('sh').textContent = screen.height;
document.getElementById('bh').textContent = document.body.offsetHeight;
document.getElementById('sa').textContent = window.navigator.standalone;
document.getElementById('dm').textContent = window.matchMedia('(display-mode: standalone)').matches ? 'standalone' : 'browser';

// Read CSS env values
const el = document.createElement('div');
el.style.cssText = 'position:fixed;top:env(safe-area-inset-top,0px);left:0;width:1px;height:1px;';
document.body.appendChild(el);
const top = getComputedStyle(el).top;
document.getElementById('sat').textContent = top;

el.style.cssText = 'position:fixed;bottom:env(safe-area-inset-bottom,0px);left:0;width:1px;height:1px;';
const bot = getComputedStyle(el).bottom;
document.getElementById('sab').textContent = bot;
document.body.removeChild(el);
</script>
</body>
</html>
