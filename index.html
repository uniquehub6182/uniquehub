<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F1419" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="UniqueHub" />
    <meta name="description" content="UniqueHub — Plataforma de gestão da Unique Marketing 360" />

    <title>UniqueHub | Unique Marketing 360</title>

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120x120.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA manifest icons -->
    <link rel="manifest" href="/manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      html {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #0F1419;
        -webkit-text-size-adjust: 100%;
      }
      body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        min-height: 100%;
        min-height: -webkit-fill-available;
        overflow: hidden;
        overscroll-behavior: none;
        background: #0F1419;
      }
      #root {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #0F1419;
      }
      /* Desktop override */
      html.uh-desktop, html.uh-desktop body, html.uh-desktop #root {
        overflow: auto !important;
        height: auto !important;
        min-height: 100vh;
        overscroll-behavior: auto !important;
      }
    </style>
    <script>
      /* Detect desktop immediately before React loads */
      if (window.innerWidth >= 900) document.documentElement.classList.add('uh-desktop');
      window.addEventListener('resize', function() {
        if (window.innerWidth >= 900) document.documentElement.classList.add('uh-desktop');
        else document.documentElement.classList.remove('uh-desktop');
      });
      /* iOS fix: set html height to actual screen height */
      function fixVH() {
        if (document.documentElement.classList.contains('uh-desktop')) return;
        document.documentElement.style.height = window.innerHeight + 'px';
      }
      fixVH();
      window.addEventListener('resize', fixVH);
      window.addEventListener('orientationchange', function(){ setTimeout(fixVH, 150); });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
